services:
  db:
    image: postgres:18-alpine3.23
    container_name: consultosec_db
    restart: always
    environment:
      POSTGRES_DB: consultosec_local
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: adminpassword
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
